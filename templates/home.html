<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Task Manager</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Modern sunrise gradient background */
            background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 99%, #FECFEF 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #333;
        }
        .hero-container {
            background: rgba(255, 255, 255, 0.8);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            max-width: 500px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #ff6b81;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #555;
        }
        .btn-start {
            background: #ff6b81;
            color: white;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 129, 0.4);
            display: inline-block;
        }
        .btn-start:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 107, 129, 0.6);
            background: #ff4757;
        }
    </style>
</head>
<body>

    <div class="hero-container">
        <h1>TO-DO APP</h1>
        <p>Ready to crush your goals and get things done?</p>
        <!-- Routes to the /tasks endpoint -->
        <a href="{{ url_for('tasks') }}" class="btn-start">Let's Start the Day </a>
    </div>

</body>
</html>
